<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password | Supplier</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  font-family:'Poppins',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(14px);
  border-radius:22px;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
  color:#fff;
}

.form-control{
  background:rgba(255,255,255,.15);
  border:none;
  color:#fff;
}

.form-control::placeholder{
  color:#ccc;
}

.form-control:focus{
  background:rgba(255,255,255,.22);
  color:#fff;
  box-shadow:none;
}

.btn-warning{
  font-weight:600;
  border-radius:12px;
}

.small-link{
  color:#ddd;
  text-decoration:none;
}

.small-link:hover{
  color:#fff;
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="col-md-4 col-sm-10">
 <div class="card p-4">

  <h3 class="text-center mb-2">Forgot Password 🔐</h3>
  <p class="text-center text-light mb-4" style="font-size:14px;">
   Enter owner name & set a new password
  </p>

  {% for msg in messages %}
   <div class="alert alert-warning text-dark">{{ msg }}</div>
  {% endfor %}

  <form method="POST">
   {% csrf_token %}

   <input class="form-control mb-3" name="owner_name"
          placeholder="Owner Name" required>

   <input class="form-control mb-3" type="password"
          name="new_password" placeholder="New Password" required>

   <button class="btn btn-warning w-100 mt-2">
    Reset Password
   </button>
  </form>

  <div class="text-center mt-3">
   <a href="{% url 'supplier_login' %}" class="small-link">
    ← Back to Login
   </a>
  </div>

 </div>
</div>

</body>
</html>
