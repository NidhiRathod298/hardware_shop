<!DOCTYPE html>
<html>
<head>
<title>Customer Reviews | HardwarePro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#020617;color:#fff}
.review{
 background:rgba(255,255,255,.08);
 border-radius:18px;
 padding:20px;
 box-shadow:0 20px 50px rgba(0,0,0,.6);
}
.star{color:#facc15}
</style>
</head>
<body>

<div class="container py-5">
<h2 class="text-center mb-5">❤️ What Customers Say</h2>

<div class="row g-4">
{% for r in reviews %}
<div class="col-md-4">
 <div class="review">
  <h3>{{ r.emoji }}</h3>
  <p>
   {% for i in "12345"|slice:":r.rating" %}
    <span class="star">★</span>
   {% endfor %}
  </p>
  <ul>
   {% for p in r.liked_list %}
    <li>{{ p }}</li>
   {% endfor %}
  </ul>
  <small class="text-muted">
   {{ r.created_at|date:"d M Y" }}
  </small>
 </div>
</div>
{% endfor %}
</div>

</div>
</body>
</html>
