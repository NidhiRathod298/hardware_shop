<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supplier Register | HardwarePro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{
  min-height:100vh;
  background:
    radial-gradient(circle at top left,#00c6ff25,transparent 40%),
    radial-gradient(circle at bottom right,#0072ff25,transparent 40%),
    linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  font-family:'Poppins',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

.register-box{
  position:relative;
  width:100%;
  max-width:460px;
  background:rgba(255,255,255,0.10);
  backdrop-filter:blur(18px);
  border-radius:26px;
  padding:40px 35px;
  box-shadow:0 45px 120px rgba(0,0,0,.7);
}

/* BACK */
.back-link{
  position:absolute;
  top:18px;
  left:22px;
  font-size:14px;
  color:#9fdfff;
  text-decoration:none;
}
.back-link:hover{color:#fff}

/* BRAND */
.brand{font-weight:700;color:#00c6ff}
.subtitle{font-size:14px;color:#ccc}

/* INPUT */
.form-control{
  background:rgba(255,255,255,.15);
  border:none;
  border-radius:14px;
  padding:12px 14px;
  color:#fff;
}
.form-control::placeholder{color:#ccc}

/* BUTTON */
.btn-register{
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  border:none;
  border-radius:14px;
  padding:12px;
  font-weight:600;
}
</style>
</head>

<body>

<div class="register-box">

 <!-- BACK TO MAIN DASHBOARD -->
 <a href="{% url 'dashboard' %}" class="back-link">← Back</a>

 <h3 class="text-center mb-1">
  <span class="brand">HardwarePro</span>
 </h3>
 <p class="text-center subtitle mb-4">
  Supplier Registration
 </p>

 <!-- REGISTER FORM -->
 <form id="registerForm">
  {% csrf_token %}

  <input class="form-control mb-3" name="company" placeholder="Company Name" required>
  <input class="form-control mb-3" name="owner_name" placeholder="Owner Name" required>
  <input class="form-control mb-3" name="email" type="email" placeholder="Email" required>
  <input class="form-control mb-3" name="phone" placeholder="Phone" required>
  <input class="form-control mb-3" name="address" placeholder="Address" required>
  <input class="form-control mb-3" name="password" type="password" placeholder="Password" required>

  <button class="btn btn-register w-100 mt-2">
   Register Supplier
  </button>
 </form>

 <div class="text-center mt-4">
  <a href="{% url 'supplier_login' %}" class="text-info">
    Already registered? Login
  </a>
 </div>

</div>

<script>
document.getElementById("registerForm").addEventListener("submit", function(e){
  e.preventDefault();

  let formData = new FormData(this);

  fetch("{% url 'supplier_register' %}", {
    method: "POST",
    headers: {
      "X-Requested-With": "XMLHttpRequest"
    },
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    if(data.status === "success"){
      Swal.fire({
        icon: "success",
        title: "Registration Successful",
        text: "Now you can login as supplier",
        timer: 1600,
        showConfirmButton: false
      }).then(() => {
        window.location.href = "{% url 'supplier_login' %}";
      });
    }
    else{
      Swal.fire({
        icon: "error",
        title: "Registration Failed",
        text: data.message
      });
    }
  });
});
</script>

</body>
</html>
