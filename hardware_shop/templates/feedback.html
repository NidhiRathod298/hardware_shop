<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback | HardwarePro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  background:#0f172a;
  font-family:'Poppins',sans-serif;
}

/* MODAL CARD */
.feedback-modal{
  max-width:520px;
  margin:80px auto;
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 40px 120px rgba(0,0,0,.6);
}

/* HEADER */
.feedback-header{
  background:linear-gradient(135deg,#1e40af,#0ea5e9);
  padding:28px;
  text-align:center;
  position:relative;
}

.feedback-header img{
  width:64px;
  height:64px;
  background:#fff;
  border-radius:50%;
  padding:10px;
  margin-bottom:10px;
}

.feedback-header h5{
  color:#fff;
  font-weight:700;
}

.feedback-header small{
  color:#dbeafe;
}

/* BODY */
.feedback-body{
  padding:30px;
  text-align:center;
}

.rating-title{
  font-weight:600;
  margin-bottom:10px;
}

.tap-text{
  color:#64748b;
  font-size:14px;
  margin-bottom:20px;
}

/* EMOJI ROW */
.emoji-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:25px;
}

.emoji-box{
  cursor:pointer;
  padding:12px;
  border-radius:10px;
  width:80px;
  transition:.3s;
  border:2px solid transparent;
}

.emoji-box span{
  font-size:30px;
  display:block;
}

.emoji-box small{
  display:block;
  font-size:12px;
  margin-top:5px;
  color:#475569;
}

.emoji-box.active{
  border-color:#0ea5e9;
  background:#e0f2fe;
}

/* TEXTAREA */
textarea{
  width:100%;
  border:1px solid #cbd5f5;
  border-radius:10px;
  padding:12px;
  resize:none;
  display:none;
}

/* BUTTON */
.btn-submit{
  width:100%;
  background:#64748b;
  border:none;
  color:#fff;
  padding:12px;
  font-weight:600;
  border-radius:10px;
  margin-top:15px;
}

.btn-submit.active{
  background:#2563eb;
}
</style>
</head>

<body>

<div class="feedback-modal">

  <!-- HEADER -->
  <div class="feedback-header">
    <img src="https://cdn-icons-png.flaticon.com/512/742/742751.png">
    <h5>Your feedback is important to us</h5>
    <small>How would you rate your experience with our service?</small>
  </div>

  <!-- BODY -->
  <div class="feedback-body">

    <p class="tap-text">Tap to rate</p>

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="rating" id="rating">

      <!-- EMOJIS -->
      <div class="emoji-row">
        <div class="emoji-box" data-value="1">
          <span>😞</span><small>Very Poor</small>
        </div>
        <div class="emoji-box" data-value="2">
          <span>😕</span><small>Poor</small>
        </div>
        <div class="emoji-box" data-value="3">
          <span>😐</span><small>Average</small>
        </div>
        <div class="emoji-box" data-value="4">
          <span>😊</span><small>Good</small>
        </div>
        <div class="emoji-box" data-value="5">
          <span>😁</span><small>Excellent</small>
        </div>
      </div>

      <!-- MESSAGE -->
      <textarea name="message" rows="4"
        placeholder="What did you enjoy the most about your experience?"></textarea>

      <!-- EXTRA INFO -->
      <select name="role" class="form-select mt-3" required>
        <option value="">Who are you?</option>
        <option value="customer">Customer</option>
        <option value="supplier">Supplier</option>
      </select>

      <input type="text" name="name" class="form-control mt-3"
             placeholder="Your Name" required>

      <!-- SUBMIT -->
      <button class="btn-submit mt-3" id="submitBtn" disabled>
        Submit
      </button>
    </form>

  </div>
</div>

<script>
const emojis=document.querySelectorAll(".emoji-box");
const ratingInput=document.getElementById("rating");
const textarea=document.querySelector("textarea");
const submitBtn=document.getElementById("submitBtn");

emojis.forEach(e=>{
  e.onclick=()=>{
    emojis.forEach(x=>x.classList.remove("active"));
    e.classList.add("active");
    ratingInput.value=e.dataset.value;

    textarea.style.display="block";
    submitBtn.disabled=false;
    submitBtn.classList.add("active");
  }
});
</script>

</body>
</html>
