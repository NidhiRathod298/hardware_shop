<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Successful | HardwarePro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
 font-family:'Poppins',sans-serif;
 background:
 linear-gradient(rgba(0,0,0,.85),rgba(0,0,0,.9)),
 url('https://images.unsplash.com/photo-1586864387789-628af9feed72') center/cover fixed;
 color:#fff;
}

/* SUCCESS CARD */
.success-card{
 max-width:520px;
 margin:auto;
 background:rgba(255,255,255,0.12);
 backdrop-filter:blur(14px);
 border-radius:28px;
 padding:50px 40px;
 box-shadow:0 30px 80px rgba(0,0,0,.7);
 animation:fadeUp .7s ease;
}

/* CHECK ICON */
.check{
 width:90px;height:90px;
 border-radius:50%;
 background:linear-gradient(135deg,#00ff99,#00c853);
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:44px;
 color:#000;
 margin:0 auto 25px;
 animation:pop .5s ease;
}

@keyframes pop{
 0%{transform:scale(0)}
 80%{transform:scale(1.2)}
 100%{transform:scale(1)}
}

@keyframes fadeUp{
 from{opacity:0;transform:translateY(40px)}
 to{opacity:1;transform:translateY(0)}
}

/* ORDER INFO */
.info{
 background:rgba(0,0,0,.4);
 border-radius:18px;
 padding:18px;
 margin-top:25px;
}

/* BUTTONS */
.btn-main{
 background:linear-gradient(45deg,#00c6ff,#0072ff);
 border:none;
 color:#fff;
 padding:12px 22px;
 border-radius:14px;
}
.btn-outline{
 border:2px solid #00c6ff;
 color:#00c6ff;
 border-radius:14px;
 padding:12px 22px;
}
</style>
</head>

<body>

<div class="container py-5">
 <div class="success-card text-center">

  <div class="check">
   <i class="bi bi-check-lg"></i>
  </div>

  <h2 class="fw-bold mb-2">Order Placed Successfully</h2>
  <p class="text-light mb-4">
   Thank you for shopping with <strong>HardwarePro</strong> 🚀
  </p>

  <div class="info text-start">
   <p class="mb-2"><strong>Order ID:</strong> #{{ order.id }}</p>
   <p class="mb-2"><strong>Payment Method:</strong> {{ order.payment_method }}</p>
   <p class="mb-0"><strong>Total Amount:</strong> ₹ {{ order.total_amount }}</p>
  </div>

  <div class="d-flex gap-3 justify-content-center mt-4">
   <a href="{% url 'products' %}" class="btn btn-main">
    <i class="bi bi-bag"></i> Shop More
   </a>
   <a href="{% url 'my_orders' %}" class="btn btn-outline">
    <i class="bi bi-receipt"></i> My Orders
   </a>
  </div>

 </div>
</div>

</body>
</html>
